apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-live-avatar-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-live-avatar-demo
  template:
    metadata:
      labels:
        app: hermes-live-avatar-demo
    spec:
      containers:
        - name: demo
          image: hermes-live-avatar:latest
          imagePullPolicy: IfNotPresent
          args: ["--host", "0.0.0.0", "--port", "8080", "--character", "/app/character_input"]
          ports:
            - containerPort: 8080
          env:
            - name: LUXTTS_COMMAND
              valueFrom:
                secretKeyRef:
                  name: hermes-live-avatar-secrets
                  key: luxtts-command
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-live-avatar-demo
spec:
  selector:
    app: hermes-live-avatar-demo
  ports:
    - name: http
      port: 80
      targetPort: 8080
